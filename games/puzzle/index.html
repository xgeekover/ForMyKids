<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e6dcff" />
  <title>조각조각 퍼즐 🧩</title>

  <!-- 귀여운 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- 플랫폼 공통 Storybook 테마 -->
  <link rel="stylesheet" href="../../shared/theme.css" />
  <!-- 게임 전용 스타일 -->
  <link rel="stylesheet" href="puzzle.css" />
</head>

<body class="fmk-reset puzzle-body">
  <!-- 🏠 홈으로 (플랫폼 메인 런처로) — 좌상단 공통 버튼 -->
  <a class="fmk-home-btn" href="../../index.html" aria-label="홈으로 — 게임 고르기로 돌아가기">
    <span class="fmk-home-emoji" aria-hidden="true">🏠</span>
    <span class="fmk-home-text">홈</span>
  </a>

  <!-- 상단 정보 (시간 · 진행) + 미리보기 토글 -->
  <div id="hud" class="hud is-hidden" aria-hidden="true">
    <div class="hud-pill" title="걸린 시간">
      <span class="hud-icon" aria-hidden="true">⏱️</span>
      <span id="timeLabel" class="hud-value">0:00</span>
    </div>
    <div class="hud-pill" title="맞춘 조각">
      <span class="hud-icon" aria-hidden="true">🧩</span>
      <span id="progressLabel" class="hud-value">0/0</span>
    </div>
    <button id="btnHint" class="hud-pill hud-pill--btn" type="button" title="살짝 보기" aria-pressed="false">
      <span class="hud-icon" aria-hidden="true">👀</span>
      <span class="hud-value">살짝</span>
    </button>
  </div>

  <!-- 게임 플레이 영역 (보드 + 트레이 + 조각) -->
  <div id="playfield" class="playfield is-hidden" aria-hidden="true">
    <!-- 목표 보드(슬롯 격자 + 옅은 미리보기) -->
    <div id="board" class="board">
      <div id="boardPreview" class="board-preview" aria-hidden="true"></div>
      <div id="boardSlots" class="board-slots" aria-hidden="true"></div>
    </div>
    <!-- 트레이 영역 안내 -->
    <div id="trayHint" class="tray-hint" aria-hidden="true">여기 조각을 끌어다 맞춰요! ✨</div>
    <!-- 조각들이 이 레이어에 절대좌표로 놓임 -->
    <div id="pieceLayer" class="piece-layer"></div>
  </div>

  <!-- 시작 화면: 카테고리 토글 + 그림 고르기 + 난이도 -->
  <div id="startScreen" class="screen is-open">
    <div class="screen-card screen-card--start">
      <div class="screen-emoji floaty-emoji" aria-hidden="true">🧩</div>
      <h1 class="screen-title">조각조각 퍼즐</h1>
      <p class="how-line">그림을 골라 조각을 맞춰요!</p>

      <!-- (a) 카테고리 토글 -->
      <div id="catToggle" class="cat-toggle" role="tablist" aria-label="그림 종류"></div>

      <!-- (b) 선택 카테고리의 이미지 썸네일 -->
      <div id="thumbGrid" class="thumb-grid" role="listbox" aria-label="그림 고르기"></div>

      <!-- (c) 난이도 10버튼 -->
      <h2 class="section-title">난이도를 골라요</h2>
      <div id="levelGrid" class="level-grid level-grid--puzzle"></div>
    </div>
  </div>

  <!-- 승리 화면 -->
  <div id="winScreen" class="screen">
    <div class="screen-card">
      <div class="screen-emoji" aria-hidden="true">🎉</div>
      <h2 class="screen-title">완성! 🎉</h2>
      <p class="win-praise" id="winPraise">우와, 정말 멋지게 맞췄어요!</p>
      <div class="win-stats">
        <div class="win-stat">
          <div class="win-stat-label">걸린 시간</div>
          <div class="win-stat-value" id="winTime">0:00</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">최고 기록</div>
          <div class="win-stat-value win-stat-value--best" id="bestTime">-</div>
        </div>
      </div>
      <!-- 이번 판에 새로 딴 칭찬 도장(업적) -->
      <div id="newAchieves" class="new-achieves is-hidden"></div>
      <div class="win-actions">
        <button class="fmk-btn fmk-btn--mint big-start" id="btnReplay" type="button">
          <span aria-hidden="true">🔄</span> 다시하기
        </button>
        <button class="fmk-btn fmk-btn--sky big-start" id="btnChoose" type="button">
          <span aria-hidden="true">🖼️</span> 다른 그림
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./puzzle.js"></script>
</body>
</html>
