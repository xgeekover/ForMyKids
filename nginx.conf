# ForMyKids 정적 MPA 서빙 + /api 백엔드 프록시 (Nginx server 블록)
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 압축(텍스트 자산)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 해시 파일명 정적 자산(/assets/...) → 1년 불변 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 이미지/폰트 등도 캐시(존재할 때만)
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Service Worker / manifest 는 절대 캐시하지 않음(업데이트 즉시 반영)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # 클라우드 동기화 API → 백엔드 컨테이너로 프록시(compose 내부 네트워크)
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # MPA 라우팅: 실제 파일/디렉터리 → 해당 index.html, 그 외에는 런처로 폴백
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
